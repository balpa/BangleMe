name: BangleMe
options:
  bundleIdPrefix: com.bangleme
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  BangleMe:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BangleMe
        excludes:
          - "Info.plist"
    info:
      path: BangleMe/Info.plist
      properties:
        CFBundleDisplayName: BangleMe
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiredDeviceCapabilities:
          - arm64
          - front-facing-camera
        NSCameraUsageDescription: "Bileziği bileğinde görebilmen için kameranı kullanıyoruz"
        NSPhotoLibraryAddUsageDescription: "Çektiğin foto ve videoları telefonuna kaydetmek için"
        NSMicrophoneUsageDescription: "Videolarına ses eklemek için (opsiyonel)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bangleme.app
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  BangleMeTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - BangleMeTests
    dependencies:
      - target: BangleMe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bangleme.app.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/BangleMe.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/BangleMe

schemes:
  BangleMe:
    build:
      targets:
        BangleMe: all
        BangleMeTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BangleMeTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
